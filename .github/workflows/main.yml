# ================================
# Workflow name hiển thị trên GitHub Actions
# ================================
name: Playwright LuxSales Tests

# ================================
# Permissions
# ================================
permissions:
  contents: write
  pages: write
  id-token: write

# ================================
# Trigger workflow
# ================================
on:
  push:
    branches: [main, master]

  pull_request:
    branches: [main, master]

# ================================
# Concurrency
# ================================
concurrency:
  group: playwright lux sales
  cancel-in-progress: true

jobs:
  test:
    timeout-minutes: 60

    runs-on: ubuntu-latest

    env:
      ENVIRONMENT: LuxSales STG 1.0.146
      AUTHOR: Minh Nguyen
      PLATFORM: Ubuntu
      BROWSER: Chromium

    steps:
      # Checkout source code
      - name: Checkout source
        uses: actions/checkout@v4

      # Setup Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 23.9.0

      # Cache npm
      - name: Cache npm
        uses: actions/cache@v3
        with:
          path: ~/.npm
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      # Install dependencies
      - name: Install dependencies
        run: npm ci

      # Install Playwright browsers
      - name: Install Playwright Browsers
        run: npx playwright install --with-deps chromium

      # Generate Allure environment
      - name: Generate Allure environment
        run: npx ts-node scripts/generate-env.ts

      # Run Playwright Tests (always continue so report steps can run)
      - name: Run Playwright Tests
        id: playwright-test
        run: npx playwright test
        env:
          BASE_URL: ${{ secrets.BASE_URL }}
          ADMIN_USERNAME: ${{ secrets.ADMIN_USERNAME }}
          ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
          DB_HOST: ${{ secrets.DB_HOST }}
          DB_PORT: ${{ secrets.DB_PORT }}
          DB_NAME: ${{ secrets.DB_NAME }}
          DB_USER: ${{ secrets.DB_USER }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
        continue-on-error: true

      # Upload Playwright HTML report
      - name: Upload Playwright Report
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30

      # Generate Allure Report even when tests fail
      - name: Generate Allure Report
        if: ${{ always() }}
        run: |
          if [ -d "allure-results" ]; then
            npx allure generate allure-results --clean -o allure-report
          else
            echo "allure-results does not exist; skipping report generation"
          fi

      # Fail the job only after report generation is done
      - name: Check Playwright result
        if: ${{ always() }}
        run: |
          if [ "${{ steps.playwright-test.outcome }}" != "success" ]; then
            echo "Playwright tests failed"
            exit 1
          fi

      # Upload Allure report artifact
      - name: Upload Allure Report
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: allure-report
          path: allure-report/
          retention-days: 30

      # Configure GitHub Pages deployment
      - name: Configure Pages
        if: ${{ github.ref == 'refs/heads/main' && github.event_name != 'pull_request' }}
        uses: actions/configure-pages@v5

      # Upload Allure report to Pages artifact
      - name: Upload Pages artifact
        if: ${{ github.ref == 'refs/heads/main' && github.event_name != 'pull_request' }}
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./allure-report

      # Deploy Allure report to GitHub Pages
      - name: Deploy Allure Report
        if: ${{ github.ref == 'refs/heads/main' && github.event_name != 'pull_request' }}
        id: deployment
        uses: actions/deploy-pages@v4

      # Upload artifacts
      - name: Upload test artifacts
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-artifacts
          path: |
            test-results/
            **/screenshots/**
            **/*.png
            **/*.webm
            **/*.zip
            playwright-report/