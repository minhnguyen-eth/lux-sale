# ================================
# Workflow name hiển thị trên GitHub Actions
# ================================
name: Playwright Test

# ================================
# Permissions
# ================================
permissions:
  contents: write
  pages: write
  id-token: write

# ================================
# Trigger workflow
# ================================
on:
  push:
    branches: [main, master]

  pull_request:
    branches: [main, master]

# ================================
# Concurrency
# ================================
concurrency:
  group: playwright-demo
  cancel-in-progress: true

jobs:
  test:
    timeout-minutes: 60

    runs-on: ubuntu-latest

    env:
      ENVIRONMENT: LuxSales STG 1.0.146
      AUTHOR: Minh Nguyen
      PLATFORM: Ubuntu
      BROWSER: Chromium

    steps:
      # Checkout source code
      - name: Checkout source
        uses: actions/checkout@v4

      # Setup Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 23.9.0

      # Cache npm
      - name: Cache npm
        uses: actions/cache@v3
        with:
          path: ~/.npm
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      # Install dependencies
      - name: Install dependencies
        run: npm ci

      # Install Playwright browsers
      - name: Install Playwright Browsers
        run: npx playwright install --with-deps chromium

      # Generate Allure environment
      - name: Generate Allure environment
        run: npx ts-node scripts/generate-env.ts

      # Run ONLY 1 demo test file
      - name: Run Playwright  
        run: |
          npx playwright test 
        env:
          BASE_URL: ${{ secrets.BASE_URL }}
          EMPLOYEE_USERNAME: ${{ secrets.EMPLOYEE_USERNAME }}
          EMPLOYEE_PASSWORD: ${{ secrets.EMPLOYEE_PASSWORD }}
          EMPLOYEE2_USERNAME: ${{ secrets.EMPLOYEE2_USERNAME }}
          EMPLOYEE2_PASSWORD: ${{ secrets.EMPLOYEE2_PASSWORD }}
          MANAGER_TEAM_USERNAME: ${{ secrets.MANAGER_TEAM_USERNAME }}
          MANAGER_TEAM_PASSWORD: ${{ secrets.MANAGER_TEAM_PASSWORD }}
          MANAGER_DEPARTMENT_USERNAME: ${{ secrets.MANAGER_DEPARTMENT_USERNAME }}
          MANAGER_DEPARTMENT_PASSWORD: ${{ secrets.MANAGER_DEPARTMENT_PASSWORD }}
          ADMIN_USERNAME: ${{ secrets.ADMIN_USERNAME }}
          ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
          DB_HOST: ${{ secrets.DB_HOST }}
          DB_PORT: ${{ secrets.DB_PORT }}
          DB_NAME: ${{ secrets.DB_NAME }}
          DB_USER: ${{ secrets.DB_USER }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}

      # Upload Playwright HTML report
      - name: Upload Playwright Report
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30

      # Generate Allure Report
      - name: Generate Allure Report
        if: ${{ !cancelled() }}
        run: |
          npx allure generate allure-results --clean -o allure-report

      # Deploy Allure report to GitHub Pages
      - name: Deploy Allure Report
        if: ${{ !cancelled() && github.ref == 'refs/heads/main' && github.event_name != 'pull_request' }}
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./allure-report
          publish_branch: gh-pages

      # Upload artifacts
      - name: Upload test artifacts
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-artifacts
          path: |
            test-results/
            **/screenshots/**
            **/*.png
            **/*.webm
            **/*.zip
            playwright-report/