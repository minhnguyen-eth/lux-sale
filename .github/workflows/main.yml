name: Playwright LuxSales Tests

permissions:
  contents: read
  pages: write
  id-token: write

on:
  push:
    branches:
      - main
      - master

  pull_request:
    branches:
      - main
      - master

concurrency:
  group: playwright-luxsales
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    env:
      ENVIRONMENT: LuxSales STG 1.0.146
      AUTHOR: Minh Nguyen
      PLATFORM: Ubuntu
      BROWSER: Chromium

    steps:
      # Checkout source code
      - name: Checkout source
        uses: actions/checkout@v4

      # Setup Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      # Cache npm
      - name: Cache npm
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      # Install dependencies
      - name: Install dependencies
        run: npm ci

      # Install Playwright Browsers
      - name: Install Playwright Browsers
        run: npx playwright install --with-deps chromium

      # Run tests
      - name: Run Playwright Tests
        id: playwright-test
        run: npx playwright test
        env:
          BASE_URL: ${{ secrets.BASE_URL }}
          ADMIN_USERNAME: ${{ secrets.ADMIN_USERNAME }}
          ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
          DB_HOST: ${{ secrets.DB_HOST }}
          DB_PORT: ${{ secrets.DB_PORT }}
          DB_NAME: ${{ secrets.DB_NAME }}
          DB_USER: ${{ secrets.DB_USER }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
        continue-on-error: true

      # Generate Allure Environment
      - name: Generate Allure Environment
        if: always()
        run: npx ts-node scripts/generate-env.ts

      # Generate Allure Report
      - name: Generate Allure Report
        if: always()
        run: |
          if [ -d "allure-results" ]; then
            npx allure generate allure-results --clean -o allure-report
          else
            echo "allure-results not found"
          fi

      # Debug
      - name: Debug Allure Report
        if: always()
        run: |
          echo "===== allure-report ====="
          ls -la allure-report || true

      # Upload Playwright Report
      - name: Upload Playwright Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30

      # Upload Allure Report
      - name: Upload Allure Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-report
          path: allure-report/
          retention-days: 30

      # Upload test artifacts
      - name: Upload test artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-artifacts
          path: |
            test-results/
            playwright-report/
            **/*.png
            **/*.webm
            **/*.zip
          retention-days: 30

      # Configure GitHub Pages
      - name: Configure Pages
        if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
        uses: actions/configure-pages@v5

      # Upload Pages Artifact
      - name: Upload Pages Artifact
        if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./allure-report

      # Deploy to GitHub Pages
      - name: Deploy Allure Report
        if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
        id: deployment
        uses: actions/deploy-pages@v4

      # Fail workflow at the very end
      - name: Check Playwright Result
        if: always() && steps.playwright-test.outcome != 'success'
        run: |
          echo "=================================="
          echo "Playwright tests failed"
          echo "Allure report has been generated"
          echo "GitHub Pages deployment completed"
          echo "=================================="
          exit 1